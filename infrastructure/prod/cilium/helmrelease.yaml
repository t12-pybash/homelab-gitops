apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 10m
  chart:
    spec:
      chart: cilium
      version: ">=1.16.0 <1.17.0"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    ipam:
      mode: cluster-pool
      operator:
        clusterPoolIPv4PodCIDRList: "10.244.0.0/16"
        clusterPoolIPv4MaskSize: 24
    kubeProxyReplacement: false
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true
    devices: "enp+"
    k8sServiceHost: "10.0.0.102"
    k8sServicePort: 6443
    operator:
      replicas: 1
