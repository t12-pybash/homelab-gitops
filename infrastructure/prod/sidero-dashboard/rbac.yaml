apiVersion: v1
kind: ServiceAccount
metadata:
  name: sidero-dashboard
  namespace: sidero-dashboard
  labels:
    app.kubernetes.io/name: sidero-dashboard
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sidero-dashboard-reader
  labels:
    app.kubernetes.io/name: sidero-dashboard
rules:
  # Core API group
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - services
      - endpoints
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - events
      - namespaces
      - secrets
    verbs: ["get", "list", "watch"]
  # Apps API group
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Batch API group
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Storage API group
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list", "watch"]
  # Network Policy
  - apiGroups: ["networking.k8s.io"]
    resources:
      - networkpolicies
      - ingresses
    verbs: ["get", "list", "watch"]
  # Metrics
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - pods
      - nodes
    verbs: ["get", "list"]
  # Helm Releases (Flux)
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  # Kustomizations (Flux)
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  # Git Repositories (Flux)
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmcharts
      - helmrepositories
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sidero-dashboard-reader
  labels:
    app.kubernetes.io/name: sidero-dashboard
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sidero-dashboard-reader
subjects:
  - kind: ServiceAccount
    name: sidero-dashboard
    namespace: sidero-dashboard
---
# Secret for storing service account token (auto-created by Kubernetes)
apiVersion: v1
kind: Secret
metadata:
  name: sidero-dashboard-token
  namespace: sidero-dashboard
  annotations:
    kubernetes.io/service-account.name: sidero-dashboard
type: kubernetes.io/service-account-token
