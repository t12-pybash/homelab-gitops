apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redpanda
  namespace: messaging
spec:
  interval: 10m
  chart:
    spec:
      chart: redpanda
      version: "26.1.4"
      sourceRef:
        kind: HelmRepository
        name: redpanda
        namespace: messaging
      interval: 10m
  install:
    crds: Create
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  values:
    statefulset:
      replicas: 1

    resources:
      cpu:
        cores: 1
      memory:
        container:
          max: 1500Mi

    storage:
      persistentVolume:
        enabled: true
        size: 5Gi
        storageClass: truenas-iscsi

    tls:
      enabled: false

    auth:
      sasl:
        enabled: false

    external:
      enabled: false

    listeners:
      kafka:
        port: 9092
        tls:
          enabled: false
      http:
        enabled: false
      schemaRegistry:
        enabled: false

    console:
      enabled: true
      ingress:
        enabled: true
        className: nginx
        hosts:
          - host: redpanda.home.t12.io
            paths:
              - path: /
                pathType: Prefix
