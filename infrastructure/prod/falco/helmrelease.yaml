apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m
  chart:
    spec:
      chart: falco
      version: ">=8.0.0 <9.0.0"
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: falco
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    driver:
      kind: kmod

    falcosidekick:
      enabled: true
      config:
        webhook:
          address: "http://ntfy.monitoring.svc.cluster.local/homelab-alerts"
          minimumpriority: "warning"

    falcoctl:
      artifact:
        install:
          refs:
            - falco-rules:5
        follow:
          refs:
            - falco-rules:5

    falco:
      json_output: false
      log_level: info
      rules_inline: |
        - rule: Debug catch-all exec
          desc: Fire on any process execution anywhere
          condition: spawned_process
          output: "FALCO_DEBUG proc=%proc.name pid=%proc.pid user=%user.name container_id=%container.id"
          priority: DEBUG
          tags: [debug]

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
