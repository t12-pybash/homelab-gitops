apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-from-vault-ingest
  namespace: ai-platform
spec:
  podSelector:
    matchLabels:
      app: qdrant
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault-ingest
    ports:
    - protocol: TCP
      port: 6333
