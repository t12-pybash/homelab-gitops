apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm
  namespace: ai-platform
spec:
  interval: 10m
  chart:
    spec:
      chart: ./helm/litellm
      sourceRef:
        kind: GitRepository
        name: homelab-gitops
        namespace: ai-platform
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/berriai/litellm
      tag: main-latest
    service:
      type: NodePort
      nodePort: 30800
      port: 4000
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    livenessProbe:
      tcpSocket:
        port: 4000
      initialDelaySeconds: 60
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      tcpSocket:
        port: 4000
      initialDelaySeconds: 45
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 2
    env:
      - name: LITELLM_LOG
        value: DEBUG
      - name: LITELLM_CONFIG_PATH
        value: /app/config/config.yaml
      - name: LITELLM_MASTER_KEY
        valueFrom:
          secretKeyRef:
            name: litellm-secrets
            key: master-key
    config:
      model_list:
        - model_name: mistral
          litellm_params:
            model: ollama/mistral
            api_base: http://10.0.0.113:11434
        - model_name: llama2
          litellm_params:
            model: ollama/llama2
            api_base: http://10.0.0.113:11434
      router_settings:
        enable_pre_call_checks: true
        enable_cooldowns: true
