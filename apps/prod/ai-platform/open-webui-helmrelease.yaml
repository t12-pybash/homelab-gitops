apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: open-webui
  namespace: ai-platform
spec:
  interval: 10m
  chart:
    spec:
      chart: ./helm/open-webui
      sourceRef:
        kind: GitRepository
        name: homelab-gitops
        namespace: ai-platform
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: ghcr.io/open-webui/open-webui
      tag: latest
    service:
      type: NodePort
      nodePort: 30080
      port: 3000
      targetPort: 8080
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    env:
      OLLAMA_BASE_URL: http://10.0.0.113:11434
      OLLAMA_API_BASE_URL: http://10.0.0.113:11434
