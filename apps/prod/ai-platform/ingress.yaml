apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: open-webui-tls
  namespace: ai-platform
spec:
  secretName: open-webui-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - open-webui.home.t12.io
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: litellm-tls
  namespace: ai-platform
spec:
  secretName: litellm-tls
  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer
  dnsNames:
    - litellm.home.t12.io
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-webui
  namespace: ai-platform
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - open-webui.home.t12.io
      secretName: open-webui-tls
  rules:
    - host: open-webui.home.t12.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: open-webui
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: litellm
  namespace: ai-platform
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - litellm.home.t12.io
      secretName: litellm-tls
  rules:
    - host: litellm.home.t12.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: litellm
                port:
                  number: 4000
