apiVersion: batch/v1
kind: CronJob
metadata:
  name: vault-ingest
  namespace: vault-ingest
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: sync-vault
              image: ghcr.io/t12-pybash/sre-cli:latest
              imagePullPolicy: Always
              command:
                - sh
                - -c
                - |
                  mkdir -p /root/.ssh
                  cp /ssh/id_ed25519 /root/.ssh/id_ed25519
                  cp /ssh/known_hosts /root/.ssh/known_hosts
                  chmod 600 /root/.ssh/id_ed25519
                  rsync -az --delete \
                    -e "ssh -i /root/.ssh/id_ed25519 -o UserKnownHostsFile=/root/.ssh/known_hosts" \
                    py@10.0.0.113:/home/py/Documents/obsidian-vault/ /vault/
              volumeMounts:
                - name: vault-data
                  mountPath: /vault
                - name: ssh-key
                  mountPath: /ssh
                  readOnly: true
          containers:
            - name: ingest
              image: ghcr.io/t12-pybash/sre-cli:latest
              imagePullPolicy: Always
              env:
                - name: SRE_CONFIG_FILE
                  value: /etc/sre/config.toml
              volumeMounts:
                - name: vault-data
                  mountPath: /vault
                  readOnly: true
                - name: sre-config
                  mountPath: /etc/sre
                - name: ingest-cache
                  mountPath: /root/.config/sre
          volumes:
            - name: vault-data
              persistentVolumeClaim:
                claimName: vault-data
            - name: ssh-key
              secret:
                secretName: vault-ingest-ssh
                defaultMode: 0400
            - name: sre-config
              configMap:
                name: sre-config
            - name: ingest-cache
              persistentVolumeClaim:
                claimName: vault-ingest-cache
