apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki-stack
  namespace: monitoring
spec:
  interval: 10m
  chart:
    spec:
      chart: loki-stack
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: monitoring
      interval: 10m
  install:
    crds: Create
    timeout: 15m
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    timeout: 15m
    remediation:
      retries: 3
  values:
    loki:
      enabled: true
      persistence:
        enabled: true
        storageClassName: truenas-iscsi
        size: 20Gi
      config:
        auth_enabled: false
        ingester:
          chunk_idle_period: 3m
          chunk_retain_period: 1m
          max_chunk_age: 1h
        limits_config:
          enforce_metric_name: false
          reject_old_samples: true
          reject_old_samples_max_age: 168h
    promtail:
      enabled: true
      config:
        clients:
          - url: http://loki:3100/loki/api/v1/push
        scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: pod
              - source_labels: [__meta_kubernetes_pod_label_app]
                action: replace
                target_label: app
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
    grafana:
      enabled: false
