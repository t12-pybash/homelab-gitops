# GitLab CI/CD Pipeline for Flux GitOps
# Ensures no secrets leak, validates manifests, enforces conventional commits

stages:
  - validate
  - security
  - deploy

variables:
  HELM_CHARTS_VERSION: "1.0.0"

# Detect secrets before anything
detect-secrets:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --verbose --exit-code 1
  allow_failure: false
  only:
    - merge_requests
    - main

# Prevent commits with sensitive data
pre-commit-security:
  stage: security
  image: python:3.11
  before_script:
    - pip install pre-commit detect-secrets gitleaks
  script:
    - pre-commit run --all-files gitleaks
    - pre-commit run --all-files detect-secrets
  allow_failure: false
  only:
    - merge_requests
    - main

# Validate SOPS encryption (encrypted files only)
validate-sops:
  stage: validate
  image: mozilla/sops:latest
  script:
    - |
      echo "Checking for unencrypted secrets..."
      # Find any files that should be encrypted but aren't
      if grep -r "password:" . --include="*.yaml" --include="*.yml" 2>/dev/null | grep -v "^Binary"; then
        echo "❌ Found unencrypted password in YAML"
        exit 1
      fi

      if grep -r "token:" . --include="*.yaml" --include="*.yml" 2>/dev/null | grep -v "enc\[" | grep -v "^Binary"; then
        echo "❌ Found unencrypted token in YAML"
        exit 1
      fi

      echo "✅ No unencrypted secrets found"
  allow_failure: false
  only:
    - merge_requests
    - main

# Validate YAML syntax
yaml-validate:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add yamllint
  script:
    - yamllint -d '{rules: {line-length: {max: 120}}}' $(find . -name '*.yaml' -o -name '*.yml')
  allow_failure: false
  only:
    - merge_requests
    - main

# Validate Kubernetes manifests
kubeval-validate:
  stage: validate
  image: instrumenta/kubeval:latest
  script:
    - |
      for file in $(find . -name '*.yaml' -o -name '*.yml' | grep -v '.git' | grep -v 'node_modules'); do
        echo "Validating $file..."
        kubeval --ignore-missing-schemas --strict "$file" || echo "Skipping $file (may be Kustomization or custom resource)"
      done
  allow_failure: true
  only:
    - merge_requests
    - main

# Validate Kustomizations can build
kustomize-validate:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add curl
    - curl -sL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.3.0/kustomize_v5.3.0_linux_amd64.tar.gz | tar xz -C /usr/local/bin/
  script:
    - |
      for kustomization in $(find . -name 'kustomization.yaml' -o -name 'kustomization.yml'); do
        dir=$(dirname $kustomization)
        echo "Building $dir..."
        cd "$dir"
        kustomize build . > /dev/null || exit 1
        cd /
      done
  allow_failure: false
  only:
    - merge_requests
    - main

# Validate Helm charts referenced in HelmReleases
helm-validate:
  stage: validate
  image: alpine/helm:latest
  script:
    - |
      echo "Scanning for HelmReleases..."
      if command -v helm &> /dev/null; then
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo add nextcloud https://nextcloud.github.io/helm/
        helm repo add bitnami https://charts.bitnami.com/bitnami
        helm repo update
        echo "✅ Helm repos available"
      fi
  allow_failure: true
  only:
    - merge_requests
    - main

# Check for large files
check-large-files:
  stage: validate
  image: alpine:latest
  script:
    - |
      find . -size +1M -type f \
        ! -path './.git/*' \
        ! -path './.gitlab/*' && echo "❌ Large files found" && exit 1 || true
      echo "✅ No large files"
  allow_failure: false
  only:
    - merge_requests
    - main

# Verify commit messages
commit-lint:
  stage: validate
  image: node:18-alpine
  script:
    - |
      COMMIT_MSG=$(git log -1 --pretty=%B)
      echo "Checking commit: $COMMIT_MSG"
      if ! echo "$COMMIT_MSG" | grep -E '^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert)(\(.+\))?!?: .+'; then
        echo "❌ Commit message does not follow conventional commits"
        echo "Expected format: <type>(<scope>): <subject>"
        exit 1
      fi
  only:
    - merge_requests
    - main

# Flux validation (dry-run)
flux-validate:
  stage: validate
  image: fluxcd/flux:latest
  script:
    - flux install --namespace flux-system --export > /dev/null
    - |
      for file in $(find clusters/prod -name '*.yaml' -o -name '*.yml'); do
        echo "Validating $file with Flux..."
        flux diff kustomization flux-system --path=$file || echo "Skipping (expected for some resources)"
      done
  allow_failure: true
  only:
    - merge_requests
    - main

# Flux sync on main branch only
flux-sync:
  stage: deploy
  image: fluxcd/flux:latest
  environment:
    name: production
    action: deploy
  script:
    - echo "Flux will auto-sync from this repo"
    - echo "Changes deployed via GitOps"
  only:
    - main
  when: on_success

# Notify of deployment
notify-gitops-deployment:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - echo "✅ GitOps deployment successful"
    - echo "Changes from commit $CI_COMMIT_SHORT_SHA are now syncing to cluster"
  only:
    - main
  allow_failure: true
