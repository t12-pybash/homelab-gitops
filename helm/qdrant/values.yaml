replicaCount: 1

image:
  repository: qdrant/qdrant
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 6333
  targetPort: 6333

persistence:
  enabled: true
  size: 10Gi
  storageClassName: "truenas-iscsi"

qdrant:
  api_key: ""

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

livenessProbe:
  tcpSocket:
    port: 6333
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 6333
  initialDelaySeconds: 45
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 2

nodeSelector: {}

tolerations: []

affinity: {}
