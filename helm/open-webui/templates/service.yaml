apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app: open-webui
spec:
  type: {{ .Values.service.type }}
  ports:
  - port: {{ .Values.service.port }}
    targetPort: {{ .Values.service.targetPort }}
    protocol: TCP
    name: http
  {{- if eq .Values.service.type "NodePort" }}
    nodePort: {{ .Values.service.nodePort }}
  {{- end }}
  selector:
    app: open-webui
